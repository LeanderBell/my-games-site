<!DOCTYPE html>
<html>
<head>
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      background: #111;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    canvas {
      background: #1f7a1f;
      display: block;
      margin: 0 auto;
      border: 4px solid #2ecc71;
    }

    .ui {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      font-size: 18px;
    }

    button {
      padding: 10px 15px;
      margin: 5px;
      font-size: 16px;
      cursor: pointer;
      border: none;
      border-radius: 8px;
    }

    #menu {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    #menu h1 {
      font-size: 40px;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="ui">
  Score: <span id="score">0</span> |
  High Score: <span id="highScore">0</span>
  <br>
  <button onclick="restartGame()">Restart</button>
</div>

<div id="menu">
  <h1>🐍 Snake Game</h1>
  <button onclick="startGame()">Start</button>
</div>

<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 600;
const box = 20;

let snake, direction, food, score, gameRunning;

let highScore = localStorage.getItem("highScore") || 0;
document.getElementById("highScore").innerText = highScore;

function startGame(){
  document.getElementById("menu").style.display = "none";

  snake = [{x: 300, y: 300}]; // center start
  direction = "RIGHT";
  score = 0;
  gameRunning = true;

  food = spawnFood();

  document.getElementById("score").innerText = score;

  document.addEventListener("keydown", changeDir);
}

function restartGame(){
  location.reload();
}

function changeDir(e){
  if(!gameRunning) return;

  if(e.key === "ArrowLeft" && direction !== "RIGHT") direction = "LEFT";
  if(e.key === "ArrowUp" && direction !== "DOWN") direction = "UP";
  if(e.key === "ArrowRight" && direction !== "LEFT") direction = "RIGHT";
  if(e.key === "ArrowDown" && direction !== "UP") direction = "DOWN";
}

function spawnFood(){
  return {
    x: Math.floor(Math.random() * (size/box)) * box,
    y: Math.floor(Math.random() * (size/box)) * box
  };
}

function draw(){
  if(!gameRunning) return;

  ctx.fillStyle = "#1f7a1f";
  ctx.fillRect(0,0,size,size);

  // food (apple)
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(food.x + 10, food.y + 10, 10, 0, Math.PI * 2);
  ctx.fill();

  // snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? "#00ff99" : "#00aa66";
    ctx.beginPath();
    ctx.arc(s.x + 10, s.y + 10, 10, 0, Math.PI * 2);
    ctx.fill();
  });

  let head = {x: snake[0].x, y: snake[0].y};

  if(direction === "LEFT") head.x -= box;
  if(direction === "RIGHT") head.x += box;
  if(direction === "UP") head.y -= box;
  if(direction === "DOWN") head.y += box;

  // eat food
  if(head.x === food.x && head.y === food.y){
    score++;
    document.getElementById("score").innerText = score;
    food = spawnFood();
  } else {
    snake.pop();
  }

  // collision
  if(
    head.x < 0 || head.y < 0 ||
    head.x >= size || head.y >= size ||
    snake.some(s => s.x === head.x && s.y === head.y)
  ){
    gameOver();
    return;
  }

  snake.unshift(head);
}

function gameOver(){
  gameRunning = false;

  if(score > highScore){
    highScore = score;
    localStorage.setItem("highScore", highScore);
  }

  document.getElementById("highScore").innerText = highScore;

  setTimeout(() => {
    alert("Game Over! Score: " + score);
  }, 100);
}

setInterval(draw, 100);
</script>

</body>
</html>
