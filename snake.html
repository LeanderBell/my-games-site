<!DOCTYPE html>
<html>
<head>
  <title>Arcade Snake</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: Arial;
      color: white;
      text-align: center;
    }

    canvas {
      display: block;
      margin: auto;
      background: radial-gradient(#1f7a1f, #0b3d0b);
      border: 4px solid #2ecc71;
    }

    .ui {
      position: absolute;
      top: 10px;
      width: 100%;
      text-align: center;
      font-size: 18px;
    }

    button {
      padding: 8px 14px;
      margin: 5px;
      border-radius: 8px;
      border: none;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="ui">
  Score: <span id="score">0</span>
  <button onclick="restart()">Restart</button>
</div>

<canvas id="game" width="700" height="500"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const W = canvas.width;
const H = canvas.height;

let snake = [];
let length = 40;

let mouse = {x: W/2, y: H/2};
let speed = 3;

let dir = {x: 1, y: 0};

let apple = spawnApple();
let score = 0;

for(let i=0;i<length;i++){
  snake.push({x: W/2 - i*5, y: H/2});
}

document.addEventListener("keydown", e => {
  if(e.key === "ArrowUp") dir = {x:0,y:-1};
  if(e.key === "ArrowDown") dir = {x:0,y:1};
  if(e.key === "ArrowLeft") dir = {x:-1,y:0};
  if(e.key === "ArrowRight") dir = {x:1,y:0};
});

function spawnApple(){
  return {
    x: Math.random()*W,
    y: Math.random()*H
  };
}

function update(){
  let head = snake[0];

  let newHead = {
    x: head.x + dir.x * speed,
    y: head.y + dir.y * speed
  };

  snake.unshift(newHead);
  snake.pop();

  // eat apple
  let dx = newHead.x - apple.x;
  let dy = newHead.y - apple.y;
  let dist = Math.sqrt(dx*dx + dy*dy);

  if(dist < 15){
    score++;
    document.getElementById("score").innerText = score;
    apple = spawnApple();

    // grow
    for(let i=0;i<8;i++){
      snake.push({...snake[snake.length-1]});
    }
  }

  // walls wrap
  if(newHead.x < 0) newHead.x = W;
  if(newHead.x > W) newHead.x = 0;
  if(newHead.y < 0) newHead.y = H;
  if(newHead.y > H) newHead.y = 0;
}

function drawBackground(){
  ctx.fillStyle = "#0b3d0b";
  ctx.fillRect(0,0,W,H);

  // subtle grid glow
  for(let i=0;i<20;i++){
    ctx.strokeStyle = "rgba(0,255,0,0.03)";
    ctx.beginPath();
    ctx.moveTo(i*40,0);
    ctx.lineTo(i*40,H);
    ctx.stroke();
  }
}

function drawApple(){
  let gradient = ctx.createRadialGradient(apple.x, apple.y, 2, apple.x, apple.y, 12);
  gradient.addColorStop(0, "white");
  gradient.addColorStop(0.3, "red");
  gradient.addColorStop(1, "#7a0000");

  ctx.fillStyle = gradient;
  ctx.beginPath();
  ctx.arc(apple.x, apple.y, 10, 0, Math.PI*2);
  ctx.fill();
}

function drawSnake(){
  for(let i=0;i<snake.length;i++){
    let p = snake[i];

    let t = i / snake.length;

    ctx.fillStyle = `rgb(${0}, ${200 - t*100}, ${120 - t*80})`;

    ctx.fillRect(p.x, p.y, 8, 8);
  }
}

function loop(){
  update();
  drawBackground();
  drawApple();
  drawSnake();
  requestAnimationFrame(loop);
}

function restart(){
  location.reload();
}

loop();
</script>

</body>
</html>
