<!DOCTYPE html>
<html>
<head>
  <title>Arcade Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #1b1b1b, #0a0a0a);
      color: white;
      text-align: center;
    }

    header {
      padding: 30px;
    }

    h1 {
      font-size: 40px;
      margin: 0;
    }

    p {
      color: #aaa;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 20px;
      padding: 40px;
      max-width: 800px;
      margin: auto;
    }

    .card {
      background: #1f1f1f;
      border: 2px solid #2ecc71;
      border-radius: 15px;
      padding: 20px;
      cursor: pointer;
      transition: 0.2s ease;
      text-decoration: none;
      color: white;
      display: block;
    }

    .card:hover {
      transform: scale(1.05);
      background: #2a2a2a;
      box-shadow: 0 0 20px #2ecc71;
    }

    .emoji {
      font-size: 40px;
      margin-bottom: 10px;
    }

    footer {
      margin-top: 40px;
      color: #666;
      font-size: 12px;
      padding-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>🎮 Arcade Hub</h1>
  <p>Play simple games built in the browser</p>
</header>

<div class="grid">

  <a class="card" href="snake.html">
    <div class="emoji">🐍</div>
    <h3>Snake</h3>
    <p>Classic arcade snake game</p>
  </a>

</div>

<footer>
  Built with GitHub Pages 🚀
</footer>

</body>
</html>
