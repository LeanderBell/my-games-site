<!DOCTYPE html>
<html>
<head>
  <title>Arcade Hub</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px 20px 10px;
    }

    h1 {
      font-size: 48px;
      margin: 0;
      letter-spacing: 2px;
    }

    p {
      color: #aaa;
      margin-top: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 50px;
      max-width: 900px;
      margin: auto;
    }

    .card {
      background: #141414;
      border: 2px solid #2ecc71;
      border-radius: 16px;
      padding: 25px;
      text-decoration: none;
      color: white;
      transition: 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: scale(1.08);
      box-shadow: 0 0 25px #2ecc71;
      border-color: #00ff99;
    }

    .icon {
      font-size: 50px;
      margin-bottom: 10px;
    }

    .title {
      font-size: 20px;
      font-weight: bold;
    }

    .desc {
      font-size: 13px;
      color: #aaa;
      margin-top: 5px;
    }

    /* animated glow effect */
    .card::before {
      content: "";
      position: absolute;
      width: 150%;
      height: 150%;
      background: radial-gradient(circle, rgba(46,204,113,0.2), transparent);
      top: -25%;
      left: -25%;
      transform: rotate(25deg);
      transition: 0.5s;
    }

    .card:hover::before {
      transform: rotate(0deg);
      opacity: 1;
    }

    footer {
      margin-top: 20px;
      color: #555;
      font-size: 12px;
      padding-bottom: 20px;
    }
  </style>
</head>
<body>

<header>
  <h1>🎮 ARCADE HUB</h1>
  <p>Choose a game and play instantly</p>
</header>

<div class="grid">

  <a class="card" href="snake.html">
    <div class="icon">🐍</div>
    <div class="title">Snake</div>
    <div class="desc">Smooth arcade snake with score system</div>
  </a>

  <a class="card" href="wave.html">
    <div class="icon">⚡</div>
    <div class="title">Wave Mode</div>
    <div class="desc">Geometry Dash style wave runner</div>
  </a>

</div>

<footer>
  Built with GitHub Pages • Arcade Project 🚀
</footer>

</body>
</html>
