<!DOCTYPE html>
<html>
<head>
  <title>Smooth Snake</title>
  <style>
    body {
      margin: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-family: Arial;
      color: white;
    }

    h1 { margin: 10px; }

    canvas {
      border: 3px solid #2ecc71;
      background: #2d6a2d;
    }

    .score {
      margin-bottom: 10px;
    }
  </style>
</head>
<body>

<h1>🐍 Smooth Snake</h1>
<div class="score">Score: <span id="score">0</span></div>
<canvas id="game" width="600" height="600"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const size = 600;

let snake = [
  {x: 300, y: 300}
];

let velocity = {x: 4, y: 0};
let score = 0;

let apple = spawnApple();

document.addEventListener("keydown", e => {
  if (e.key === "ArrowUp" && velocity.y === 0) {
    velocity = {x: 0, y: -4};
  }
  if (e.key === "ArrowDown" && velocity.y === 0) {
    velocity = {x: 0, y: 4};
  }
  if (e.key === "ArrowLeft" && velocity.x === 0) {
    velocity = {x: -4, y: 0};
  }
  if (e.key === "ArrowRight" && velocity.x === 0) {
    velocity = {x: 4, y: 0};
  }
});

function spawnApple(){
  return {
    x: Math.random() * (size - 20),
    y: Math.random() * (size - 20)
  };
}

function drawGrass(){
  ctx.fillStyle = "#2d6a2d";
  ctx.fillRect(0,0,size,size);

  // simple grass texture
  for (let i = 0; i < 100; i++) {
    ctx.fillStyle = "rgba(0,0,0,0.05)";
    ctx.fillRect(Math.random()*size, Math.random()*size, 2, 10);
  }
}

function drawApple(a){
  ctx.fillStyle = "red";
  ctx.beginPath();
  ctx.arc(a.x, a.y, 10, 0, Math.PI * 2);
  ctx.fill();

  // leaf
  ctx.fillStyle = "green";
  ctx.fillRect(a.x + 3, a.y - 15, 4, 8);
}

function drawSnake(){
  for (let i = 0; i < snake.length; i++) {
    const s = snake[i];

    ctx.fillStyle = i === 0 ? "#00ff88" : "#00aa55";
    ctx.beginPath();
    ctx.arc(s.x, s.y, 10, 0, Math.PI * 2);
    ctx.fill();
  }
}

function update(){
  const head = {
    x: snake[0].x + velocity.x,
    y: snake[0].y + velocity.y
  };

  snake.unshift(head);

  // eat apple
  const dx = head.x - apple.x;
  const dy = head.y - apple.y;
  const dist = Math.sqrt(dx*dx + dy*dy);

  if (dist < 15) {
    score++;
    document.getElementById("score").innerText = score;
    apple = spawnApple();
  } else {
    snake.pop();
  }

  // walls
  if (
    head.x < 0 || head.x > size ||
    head.y < 0 || head.y > size
  ) {
    alert("Game Over! Score: " + score);
    location.reload();
  }
}

function loop(){
  drawGrass();
  drawApple(apple);
  drawSnake();
  update();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
